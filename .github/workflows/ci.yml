name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  governance-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate baseline org files
        run: |
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f .github/pull_request_template.md
          test -f profile/README.md
